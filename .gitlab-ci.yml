stages: [lint, test, build]

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

variables:
  UV_CACHE_DIR: .uv-cache

.uv-base:
  image: python:3.14-slim
  before_script:
    - pip install uv
    - uv sync --frozen
  cache:
    key:
      files: [uv.lock]
    paths: [.uv-cache]

lint:
  extends: .uv-base
  stage: lint
  script:
    - uv run ruff check .

test:
  extends: .uv-base
  stage: test
  services:
    - name: pgvector/pgvector:pg16
      alias: db
  variables:
    POSTGRES_USER: usprings
    POSTGRES_PASSWORD: usprings
    POSTGRES_DB: usprings_rag
    DATABASE_URL: "postgresql+psycopg://usprings:usprings@db:5432/usprings_rag"
  script:
    - uv run alembic upgrade head   # создаёт схему и сидит коллекции erp/zup (миграция 0004)
    - uv run pytest -q

build:images:
  stage: build
  image: docker:27
  services: [docker:27-dind]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag  "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
