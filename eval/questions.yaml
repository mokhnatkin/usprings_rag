# Golden-набор вопросов для калибровки поиска и порога (подшаг 5.4).
#
# Три вида (kind):
#   covered     - явно покрыты инструкциями, формулировка близка к тексту;
#   paraphrased - смежные/разговорные перефразировки без терминологии документа;
#   irrelevant  - заведомо не покрыты базой знаний (ожидается отказ).
#
# expected_doc - точный title документа из БД (= имя файла без расширения).
# Для irrelevant поле отсутствует.
#
# Нерелевантные подобраны по возрастанию коварства: от заведомо чужих тем до
# «трудных негативов» рядом с доменом (1С, лицензии, завод) - именно они
# определяют нижнюю границу порога.
#
# must_contain (опционально) - факты, без которых ответ бесполезен, даже если он
# формально «про то». Используется в A/B моделей (`eval/run_ab.py`): проверка
# полноты подстрокой, регистр не важен. Заполняем там, где модели реально
# «срезают углы» - именно по таким пропускам выбиралась модель на A/B 2026-07-12.

questions:
  # --- covered: по одному-два прямых вопроса на документ ---
  - q: "Как отметить выполнение операции в рабочем месте Выполнение операций?"
    kind: covered
    expected_doc: "Выполнение операций"

  - q: "Что происходит, если производственная операция выполнена частично?"
    kind: covered
    expected_doc: "Выполнение операций"

  - q: "Что такое назначение и как обеспечивать заказ клиента обособленно?"
    kind: covered
    expected_doc: "Документальная прослеживаемость в системе. Назначения"

  - q: "Как заполнить параметры операции в рабочем месте Формирование техпроцессов?"
    kind: covered
    expected_doc: "Заполнение параметров операции в рабочем месте Формирование техпроцессов"

  - q: "Можно ли изменить направление деятельности в действующем договоре?"
    kind: covered
    expected_doc: "Как поменять направление деятельности в договоре"
    # Ответ «нельзя» без продолжения бесполезен: надо сказать, что делать.
    must_contain: ["нов"]

  - q: "Как оформить трудозатраты сотрудников по этапу производства?"
    kind: covered
    expected_doc: "Оформление трудозатрат"

  - q: "Как запланировать отгрузку продукции, если на складе нет остатков?"
    kind: covered
    expected_doc: "Планирование отгрузки. Инструкция для пользователей"
    # Без роли и контроля обеспечения инструкция невыполнима (gemma роль пропускала).
    must_contain: ["не контролировать", "отгрузить", "роль"]

  - q: "Какие роли нужны пользователю для планирования отгрузки без остатков?"
    kind: covered
    expected_doc: "Планирование отгрузки. Инструкция для пользователей"

  - q: "Как распечатать УПД и транспортные накладные при отгрузке?"
    kind: covered
    expected_doc: "Планирование отгрузки. Инструкция для пользователей"

  - q: "Как работает проверка лицензионности в заказе клиента?"
    kind: covered
    expected_doc: "Проверка лицензионности"

  - q: "Как указать ключевые параметры при формировании техпроцесса?"
    kind: covered
    expected_doc: "Формирование техпроцесса_Ключевые параметры"
    # Без создания справочника изображений шаги невыполнимы (gemma его пропускала).
    must_contain: ["справочник", "ключ.парам"]

  # --- paraphrased: разговорные формулировки, без терминов из документа ---
  - q: "Клиент просит перевести задолженность на другое направление деятельности, как это сделать?"
    kind: paraphrased
    expected_doc: "Как поменять направление деятельности в договоре"

  - q: "Мастер в конце смены вносит выработку рабочих - где и как это делается?"
    kind: paraphrased
    expected_doc: "Оформление трудозатрат"

  - q: "Кто имеет право провести документ с лицензируемым товаром?"
    kind: paraphrased
    expected_doc: "Проверка лицензионности"
    # Роль сама по себе не даёт права провести - нужно ещё согласование лицензии.
    must_contain: ["проверяющийлицензионность", "согласован"]

  - q: "Как передать продукцию со складской программы под другой заказ клиента?"
    kind: paraphrased
    expected_doc: "Документальная прослеживаемость в системе. Назначения"

  - q: "Срочно отгрузили товар, которого не было на складе - как теперь правильно закрыть документы?"
    kind: paraphrased
    expected_doc: "Планирование отгрузки. Инструкция для пользователей"

  - q: "Как добавить картинку ключевого параметра в справочник?"
    kind: paraphrased
    expected_doc: "Формирование техпроцесса_Ключевые параметры"

  # --- irrelevant: от простых к трудным негативам ---
  - q: "Какая погода в Астане на выходных?"
    kind: irrelevant

  - q: "Как приготовить плов в казане?"
    kind: irrelevant

  - q: "Как оформить ежегодный отпуск в отделе кадров?"
    kind: irrelevant

  - q: "Как настроить VPN на рабочем ноутбуке?"
    kind: irrelevant

  - q: "Как сделать резервную копию базы 1С?"
    kind: irrelevant

  - q: "Сколько стоит лицензия 1С ERP и как её продлить?"
    kind: irrelevant

  - q: "Как провести инвентаризацию склада в 1С?"
    kind: irrelevant

  - q: "Как настроить права доступа пользователей в 1С?"
    kind: irrelevant
