# Golden-набор вопросов для калибровки поиска и порога.
#
# Набор построен на корпусе 1С:ИТС (прежний набор из 25 вопросов удалён вместе с
# тестовым корпусом из 8 инструкций - решение от 2026-07-14).
#
# collection - коллекция, в которой ищем (erp | zup). Обязательное поле: у каждой
# коллекции свой корпус, свои метрики и свой порог, общих чисел здесь не бывает.
#
# Три вида (kind):
#   covered     - явно покрыты инструкциями, формулировка близка к тексту;
#   paraphrased - разговорные перефразировки без терминологии документа;
#   irrelevant  - заведомо не покрыты коллекцией (ожидается отказ).
#
# expected_doc - точный title документа из БД (= имя файла без расширения).
# Для irrelevant поле отсутствует.
#
# Нерелевантные подобраны по возрастанию коварства: от заведомо чужих тем до
# «трудных негативов» рядом с доменом - именно они определяют нижнюю границу
# порога. Отдельный вид трудного негатива - вопрос из ЧУЖОЙ коллекции (склад и
# отгрузка для ЗУП): он проверяет, что база знаний не пытается отвечать на то,
# чего в ней нет, даже если тема «тоже про 1С».
#
# must_contain (опционально) - факты, без которых ответ бесполезен, даже если он
# формально «про то». Используется в A/B моделей (`eval/run_ab.py`).

questions:
  # ============================ 1С:ERP ============================
  # --- covered ---
  - q: "Какой функциональной опцией включается управление доставкой?"
    collection: erp
    kind: covered
    expected_doc: "управление доставкой"

  - q: "За что отвечает подсистема взаиморасчетов с контрагентами?"
    collection: erp
    kind: covered
    expected_doc: "взаиморасчеты"

  - q: "Что такое ГИС МТ Честный знак и как работать с маркируемой продукцией?"
    collection: erp
    kind: covered
    expected_doc: "маркировка (_честный знак_)"

  - q: "Где хранятся сведения о банковских счетах организаций предприятия?"
    collection: erp
    kind: covered
    expected_doc: "учет безналичных денежных средств"

  - q: "Как контролируются этапы работы менеджера с клиентами при оптовых продажах?"
    collection: erp
    kind: covered
    expected_doc: "оптовые продажи"

  - q: "Какие материальные ценности отражаются в составе основных средств?"
    collection: erp
    kind: covered
    expected_doc: "учет основных средств и объектов строительства"

  - q: "Как заказать услугу доставки логистической службой или курьером из программы?"
    collection: erp
    kind: covered
    expected_doc: "сервисы доставки"

  # --- paraphrased ---
  - q: "Клиент не платит по счетам, где посмотреть просроченную задолженность?"
    collection: erp
    kind: paraphrased
    expected_doc: "взаиморасчеты"

  - q: "Нужно продавать товары с обязательной маркировкой, что для этого настроить?"
    collection: erp
    kind: paraphrased
    expected_doc: "маркировка (_честный знак_)"

  - q: "Как оформить продажу партии товара оптовому покупателю?"
    collection: erp
    kind: paraphrased
    expected_doc: "оптовые продажи"

  - q: "Купили станок для цеха, как поставить его на учет?"
    collection: erp
    kind: paraphrased
    expected_doc: "учет основных средств и объектов строительства"

  # --- irrelevant ---
  - q: "Какая погода завтра в Алматы?"
    collection: erp
    kind: irrelevant

  - q: "Как приготовить плов?"
    collection: erp
    kind: irrelevant

  # трудный негатив: тема соседней коллекции (кадры и зарплата - это 1С:ЗУП)
  - q: "Как оформить прием сотрудника на работу и рассчитать ему отпускные?"
    collection: erp
    kind: irrelevant

  # трудный негатив: про 1С, но не про содержание базы
  - q: "Сколько стоит лицензия 1С:ERP Управление предприятием?"
    collection: erp
    kind: irrelevant

  # ============================ 1С:ЗУП ============================
  # --- covered ---
  - q: "Каким документом оформляется прием сотрудника на работу по трудовому договору?"
    collection: zup
    kind: covered
    expected_doc: "5.2. приемы и переводы"
    must_contain: ["Прием на работу"]

  - q: "Каким документом оформляется удержание алиментов по исполнительному листу?"
    collection: zup
    kind: covered
    expected_doc: "7.1. удержание по исполнительному листу"
    must_contain: ["Исполнительный лист"]

  - q: "В каком справочнике описываются графики работы сотрудников?"
    collection: zup
    kind: covered
    expected_doc: "11.2. графики работы"

  - q: "Каким документом формируются проводки по начислению зарплаты и страховых взносов?"
    collection: zup
    kind: covered
    expected_doc: "20.4. отражение зарплаты в бухучете"

  - q: "Какие виды ведомостей на выплату зарплаты предусмотрены в программе?"
    collection: zup
    kind: covered
    expected_doc: "16.3. ведомости на выплату"

  - q: "Как в программе ведется учет видов отпусков и их остатков?"
    collection: zup
    kind: covered
    expected_doc: "9.1. виды отпусков и учет их остатков"

  - q: "Какие этапы включает проведение специальной оценки условий труда?"
    collection: zup
    kind: covered
    expected_doc: "28.1. специальная оценка условий труда"

  - q: "Как ведется штатное расписание с сохранением истории изменений?"
    collection: zup
    kind: covered
    expected_doc: "4.4. ведение штатного расписания с сохранением истории изменений"

  # --- paraphrased ---
  - q: "Как оформить нового работника в программе?"
    collection: zup
    kind: paraphrased
    expected_doc: "5.2. приемы и переводы"

  - q: "Сотруднику присудили алименты, как это провести в программе?"
    collection: zup
    kind: paraphrased
    expected_doc: "7.1. удержание по исполнительному листу"

  - q: "Как настроить сменный режим работы вместо пятидневки?"
    collection: zup
    kind: paraphrased
    expected_doc: "11.2. графики работы"

  - q: "Как перечислить зарплату сотрудникам на банковские карты?"
    collection: zup
    kind: paraphrased
    expected_doc: "16.3. ведомости на выплату"

  - q: "Куда занести данные по вредным условиям на рабочих местах?"
    collection: zup
    kind: paraphrased
    expected_doc: "28.1. специальная оценка условий труда"

  # --- irrelevant: от заведомо чужих тем к трудным негативам ---
  - q: "Какая погода завтра в Алматы?"
    collection: zup
    kind: irrelevant

  - q: "Как приготовить плов?"
    collection: zup
    kind: irrelevant

  - q: "Как заменить масло в двигателе автомобиля?"
    collection: zup
    kind: irrelevant

  # трудный негатив: тема соседней коллекции (склад/отгрузка - это 1С:ERP)
  - q: "Как запланировать отгрузку товара со склада, если нет остатков?"
    collection: zup
    kind: irrelevant

  # трудный негатив: про 1С, но не про содержание базы ЗУП
  - q: "Сколько стоит лицензия 1С:Зарплата и управление персоналом КОРП?"
    collection: zup
    kind: irrelevant
