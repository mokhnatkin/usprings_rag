# Staging-стек usprings_rag на 195.239.217.102 (host 8085 -> внешний 5285).
# Самодостаточный compose (не override): публикует app на 8085, БД наружу не
# публикует (host PG18 держит 5432; app ходит на db:5432 внутри сети).
# Запуск на сервере: docker compose -f docker-compose.staging.yml up -d --build
services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8085:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./docs/manuals:/app/docs/manuals
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Порт наружу не публикуем: host PG18 держит 5432, внешний доступ к БД не нужен.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
