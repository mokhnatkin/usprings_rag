<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>База знаний УПЗ - ассистент по инструкциям</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="topbar">
    <a href="/profile">Профиль</a>
    <form method="post" action="/logout">
      <button type="submit">Выйти</button>
    </form>
  </div>
  <main>
    <h1>Ассистент по инструкциям</h1>
    <p class="subtitle">
      Выберите базу знаний и задайте вопрос. Ответ формируется только по документам
      выбранной базы, со ссылками на исходные файлы.
    </p>

    <form id="ask-form">
      <label class="field" for="collection">База знаний</label>
      <select id="collection" name="collection"></select>

      <textarea id="question" rows="3" placeholder="Например: как запланировать отгрузку, если на складе нет остатков?" required></textarea>
      <div class="actions">
        <button type="submit" id="submit">Спросить</button>
        <button type="button" id="reset" class="secondary hidden">Новый вопрос</button>
      </div>
    </form>

    <section id="status" class="hidden"></section>

    <section id="result" class="hidden">
      <div id="answer"></div>
      <div id="sources-block" class="hidden">
        <h2>Источники</h2>
        <ul id="sources"></ul>
      </div>
      <p id="meta" class="meta"></p>

      <div id="feedback" class="feedback hidden">
        <button type="button" id="feedback-btn" class="secondary">Ответ неверный</button>
        <div id="feedback-form" class="hidden">
          <textarea id="feedback-comment" rows="2" placeholder="Что не так? (необязательно)"></textarea>
          <button type="button" id="feedback-send" class="secondary">Отправить</button>
        </div>
        <span id="feedback-done" class="feedback-done hidden">Спасибо, отмечено.</span>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
